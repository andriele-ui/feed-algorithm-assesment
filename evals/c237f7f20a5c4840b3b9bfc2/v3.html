
    <!DOCTYPE html>
    <html>
    <head>
        <style>
            /* Vertical layout: stack cards in a column */
            body { 
                font-family: sans-serif; 
                display: flex; 
                flex-direction: column; 
                align-items: center; 
                gap: 30px; 
                padding: 40px; 
                background: #f0f2f5; 
            }
            /* Double the card width (from 320px to 640px) */
            .card { 
                width: 960px; 
                background: #fff; 
                border-radius: 12px; 
                box-shadow: 0 8px 15px rgba(0,0,0,0.1); 
                overflow: hidden; 
            }
            /* Double the container height (from 180px to 360px) */
            .thumb-container { 
                height: 640px; 
                width: 100%; 
                overflow: hidden; 
                position: relative; 
                border-bottom: 1px solid #ddd; 
            }
            /* Increased scale to 0.5 (double the original 0.25) */
            iframe { 
                width: 1280px; 
                height: 920px; 
                border: none; 
                transform: scale(0.75); 
                transform-origin: 0 0; 
            }
            .info { padding: 15px; text-align: center; }
            a { color: #0066cc; text-decoration: none; font-weight: bold; font-size: 18px; }
        </style>
    </head>
